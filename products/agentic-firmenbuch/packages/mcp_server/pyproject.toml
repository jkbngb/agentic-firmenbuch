[project]
name = "fbl-mcp-server"
version = "1.0.0"
description = "Stage 9: FastMCP server exposing the Firmenbuch tools over 10_presentation."
requires-python = ">=3.12,<3.13"
dependencies = [
    "fbl-core",
    "fbl-auth",
    "mcp>=1.2",
    "pydantic>=2.7",
    "anthropic>=0.40",
]

# Telemetry (T5) is an OPTIONAL extra: the production image installs `.[telemetry]` and sets
# APPINSIGHTS_CONNECTION_STRING; offline/dev installs and tests never pull OpenTelemetry, and the
# import stays lazy (fbl_mcp_server.telemetry) so search works identically with it absent.
[project.optional-dependencies]
telemetry = ["azure-monitor-opentelemetry>=1.6"]

[project.scripts]
fbl-mcp = "fbl_mcp_server.__main__:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fbl_mcp_server"]

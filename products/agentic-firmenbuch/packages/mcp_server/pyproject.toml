[project]
name = "fbl-mcp-server"
version = "1.0.0"
description = "Stage 9: FastMCP server exposing the Firmenbuch tools over 10_presentation."
requires-python = ">=3.12,<3.13"
dependencies = [
    "fbl-core",
    "fbl-auth",
    "mcp>=1.2",
    "pydantic>=2.7",
    "anthropic>=0.40",
]

[project.scripts]
fbl-mcp = "fbl_mcp_server.__main__:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fbl_mcp_server"]

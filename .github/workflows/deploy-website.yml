name: Deploy website

# Deploys website/ to Azure Static Web Apps on every push to main that touches it
# (plus manual runs via workflow_dispatch). Deliberately separate from ci.yml: the
# site is plain static files the Python tests don't cover, and this file also lives
# on the public mirror where the full CI workflow is disabled.
# Skips cleanly when the SWA_DEPLOYMENT_TOKEN secret isn't configured (forks).
# Token: Azure portal → swa-firmenbuch → "Manage deployment token", stored as the
# SWA_DEPLOYMENT_TOKEN repo secret.

on:
  push:
    branches: [main]
    paths: ['website/**', '.github/workflows/deploy-website.yml']
  workflow_dispatch:

jobs:
  deploy-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy website/ to Static Web Apps
        env:
          TOKEN: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "SWA_DEPLOYMENT_TOKEN not configured — skipping website deploy."
            exit 0
          fi
          npx --yes @azure/static-web-apps-cli@2 deploy ./website \
            --deployment-token "$TOKEN" --env production

      # IndexNow: tell Bing & friends right away which URLs changed. The key is
      # public by design (it must be served at /<key>.txt), so no secret needed.
      - name: Ping IndexNow with the sitemap URLs
        run: |
          KEY="48eff26c76f4061fe1c56ff548e082f2"
          URLS=$(grep -o '<loc>[^<]*</loc>' website/sitemap.xml \
            | sed -e 's/<loc>//' -e 's|</loc>||' \
            | sed 's/.*/"&"/' | paste -sd, -)
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"www.agentic-firmenbuch.at\",\"key\":\"$KEY\",\"keyLocation\":\"https://www.agentic-firmenbuch.at/$KEY.txt\",\"urlList\":[$URLS]}" \
            -w "\nIndexNow HTTP %{http_code}\n" || true

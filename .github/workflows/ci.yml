name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Lint (ruff)
        run: uv run ruff check packages tests/e2e

      - name: Format check (ruff format)
        run: uv run ruff format --check packages tests/e2e

      - name: Types (mypy --strict)
        run: uv run mypy packages

      - name: Tests (pytest + coverage)
        run: uv run pytest --cov --cov-report=term-missing --cov-fail-under=80

  bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Bicep compiles
        run: az bicep build --file infra/main.bicep

  # Build + push the two images to ACR and roll the Job/App to the new tag (§13).
  # Runs only on a push to main, and only when the deploy vars are configured (so forks
  # and unconfigured repos skip it cleanly). Auth is federated (OIDC) — no stored secrets.
  deploy:
    needs: [test, bicep]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ACR_NAME != ''
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # request the OIDC token for azure/login
      contents: read
    env:
      ACR_NAME: ${{ vars.ACR_NAME }}                 # e.g. acrfirmenbuchxbjux2hw
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}     # e.g. rg-firmenbuch-prod
      JOB_NAME: ${{ vars.PIPELINE_JOB_NAME }}        # Container Apps Job
      MCP_APP_NAME: ${{ vars.MCP_APP_NAME }}         # Container App
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build + push images to ACR
        env:
          TAG: ${{ github.sha }}
        run: |
          LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)
          for img in pipeline mcp; do
            az acr build \
              --registry "$ACR_NAME" \
              --image "firmenbuch-$img:$TAG" \
              --image "firmenbuch-$img:latest" \
              --file "infra/docker/$img.Dockerfile" .
          done
          echo "LOGIN_SERVER=$LOGIN_SERVER" >> "$GITHUB_ENV"

      - name: Roll Job + App to the new image
        env:
          TAG: ${{ github.sha }}
        run: |
          az containerapp job update \
            --name "$JOB_NAME" --resource-group "$RESOURCE_GROUP" \
            --image "$LOGIN_SERVER/firmenbuch-pipeline:$TAG"
          az containerapp update \
            --name "$MCP_APP_NAME" --resource-group "$RESOURCE_GROUP" \
            --image "$LOGIN_SERVER/firmenbuch-mcp:$TAG"

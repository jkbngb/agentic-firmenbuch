# Personalised owner notification — pings you when the agent ESCALATES a big change
# (issue labelled `needs-owner-approval`). PR notifications are handled by pr-review.yml, which
# adds a merge recommendation; this file only covers escalations so you never get a double ping.
#
# Setup (owner, 2 min): create a Slack Incoming Webhook (Slack → Apps → "Incoming Webhooks" →
# pick a channel/DM → copy the URL) and add it as repo secret SLACK_WEBHOOK_URL. The URL already
# points at your chosen channel — no Slack identity is shared with the repo. No secret → no-op.
# (Telegram/Discord work the same way: swap the curl payload; ask if you prefer those.)
name: notify-owner

on:
  issues:
    types: [labeled]

permissions:
  contents: read

jobs:
  ping:
    if: github.event.label.name == 'needs-owner-approval'
    runs-on: ubuntu-latest
    steps:
      - name: Slack ping
        env:
          HOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          TITLE: ${{ github.event.issue.title }}
          URL: ${{ github.event.issue.html_url }}
        run: |
          if [ -z "$HOOK" ]; then echo "SLACK_WEBHOOK_URL not set — skipping."; exit 0; fi
          TEXT="🔔 *Große Änderung braucht deine Entscheidung*: *$TITLE*"
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "$(printf '{"text":"%s\\n%s"}' "$TEXT" "$URL")" "$HOOK"

[project]
name = "fbl-registry"
version = "1.0.0"
description = "Layer 99_registry: the authoritative catalog of every company + the watermark."
requires-python = ">=3.12,<3.13"
dependencies = [
    "fbl-core",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fbl_registry"]

[project]
name = "fbl-consolidate"
version = "1.0.0"
description = "Stage 6a: merge all of a company's parsed filings + master into 50_consolidated."
requires-python = ">=3.12,<3.13"
dependencies = [
    "fbl-core",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fbl_consolidate"]

[project]
name = "fbl-firmenbuch-client"
version = "1.0.0"
description = "Stage 3: typed adapter over the Firmenbuch HVD SOAP API (RegisterSource)."
requires-python = ">=3.12,<3.13"
dependencies = [
    "fbl-core",
    "httpx>=0.27",
    "lxml>=5.2",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fbl_firmenbuch_client"]

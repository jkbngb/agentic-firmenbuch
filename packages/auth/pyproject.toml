[project]
name = "fbl-auth"
version = "1.0.0"
description = "Stage 9: MCP signup, token issue/validate, rate limiting, usage metering (00_accounts)."
requires-python = ">=3.12,<3.13"
dependencies = [
    "azure-communication-email>=1.0",
    "fbl-core",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fbl_auth"]

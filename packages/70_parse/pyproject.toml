[project]
name = "fbl-parse"
version = "1.0.0"
description = "Stage 2: parse raw Jahresabschluss XML into the canonical ParsedFiling (70_parsed)."
requires-python = ">=3.12,<3.13"
dependencies = [
    "fbl-core",
    "lxml>=5.2",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fbl_parse"]

[project]
name = "fbl-present"
version = "1.0.0"
description = "Stage 7: assemble the gated, denormalized public document -> 10_presentation."
requires-python = ">=3.12,<3.13"
dependencies = [
    "fbl-core",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fbl_present"]

[project]
name = "fbl-core"
version = "1.0.0"
description = "Shared, source-agnostic core for the agentic-first monorepo: lineage/meta + metric contracts, config, storage clients."
requires-python = ">=3.12,<3.13"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    # Azure SDKs are imported lazily inside storage/* so unit tests run without them,
    # but they are declared so the deployed image is self-contained (§3.2).
    "azure-cosmos>=4.7",
    "azure-storage-blob>=12.20",
    "azure-identity>=1.17",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fbl_core"]

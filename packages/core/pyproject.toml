[project]
name = "fbl-core"
version = "1.0.0"
description = "Shared core for agentic-firmenbuch: canonical Pydantic models, position mappings, lineage, config, storage clients."
requires-python = ">=3.12,<3.13"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "lxml>=5.2",
    # Azure SDKs are imported lazily inside storage/* so unit tests run without them,
    # but they are declared so the deployed image is self-contained (§3.2).
    "azure-cosmos>=4.7",
    "azure-storage-blob>=12.20",
    "azure-identity>=1.17",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fbl_core"]

[tool.hatch.build.targets.wheel.force-include]
"src/fbl_core/mapping/appendix_position_mapping.json" = "fbl_core/mapping/appendix_position_mapping.json"
"src/fbl_core/mapping/oenace/oenace2025_de.csv" = "fbl_core/mapping/oenace/oenace2025_de.csv"
"src/fbl_core/mapping/oenace/oenace2025_en.csv" = "fbl_core/mapping/oenace/oenace2025_en.csv"

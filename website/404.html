<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="mask-icon" href="/favicon.svg" color="#19C37D" />
<title>Seite nicht gefunden – Agentic-Firmenbuch.at</title>
<meta name="description" content="Diese Seite gibt es nicht (mehr). Zur Startseite, zur Verbindungs-Anleitung oder zur Datenfelder-Referenz." />
<meta name="robots" content="noindex,follow" />
<meta name="color-scheme" content="dark" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#0A0B0E;--surface:#14161B;--surface-2:#181B22;--line:rgba(255,255,255,.1);--line-2:rgba(255,255,255,.14);
    --text:#EDEFF3;--dim:#9AA2AF;--accent:#19C37D;--accent-ink:#0A0B0E;--warn:#ffb27a;
    --font-d:"Bricolage Grotesque",system-ui,sans-serif;--font-b:"IBM Plex Sans",system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-b);background:var(--ink);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:24px;line-height:1.6}
  body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(60% 40% at 50% 0%,rgba(25,195,125,.1),transparent 70%)}
  .card{max-width:460px;text-align:center;background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--line);border-radius:24px;padding:44px 34px}
  .code{font-family:var(--font-d);font-weight:700;font-size:3rem;letter-spacing:-.03em;color:var(--accent);margin-bottom:6px}
  h1{font-family:var(--font-d);font-weight:700;font-size:1.7rem;letter-spacing:-.02em;margin-bottom:12px}
  p{color:var(--dim);margin-bottom:10px}
  p a{color:var(--text)}
  .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px}
  .btn{font-weight:600;font-size:14.5px;border-radius:12px;padding:11px 18px;text-decoration:none;border:1px solid var(--line-2);color:var(--text)}
  .btn-primary{background:var(--accent);color:var(--accent-ink);border-color:transparent}
</style>
</head>
<body>
  <main class="card">
    <div class="code">404</div>
    <h1>Seite nicht gefunden</h1>
    <p>Diese Seite gibt es nicht (mehr) – vielleicht ist der Link veraltet oder vertippt.</p>
    <p lang="en">This page doesn't exist – the link may be outdated or mistyped.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Zur Startseite</a>
      <a class="btn" href="/onboarding.html">Verbindung einrichten</a>
      <a class="btn" href="/felder.html">Datenfelder</a>
    </div>
  </main>
</body>
</html>

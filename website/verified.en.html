<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="mask-icon" href="favicon.svg" color="#19C37D" />
<title>Email confirmed – Agentic-Firmenbuch.at</title>
<meta name="description" content="Your email address was confirmed — the API key is on its way." />
<link rel="canonical" href="https://www.agentic-firmenbuch.at/verified.en.html" />
<link rel="alternate" hreflang="de" href="https://www.agentic-firmenbuch.at/verified.html" />
<link rel="alternate" hreflang="en" href="https://www.agentic-firmenbuch.at/verified.en.html" />
<meta name="robots" content="noindex,follow" />
<meta name="color-scheme" content="dark" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#0A0B0E;--surface:#14161B;--surface-2:#181B22;--line:rgba(255,255,255,.1);--line-2:rgba(255,255,255,.14);
    --text:#EDEFF3;--dim:#9AA2AF;--accent:#19C37D;--accent-ink:#0A0B0E;
    --font-d:"Bricolage Grotesque",system-ui,sans-serif;--font-b:"IBM Plex Sans",system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-b);background:var(--ink);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:24px;line-height:1.6}
  body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(60% 40% at 50% 0%,rgba(25,195,125,.16),transparent 70%)}
  .card{max-width:460px;text-align:center;background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--line);border-radius:24px;padding:44px 34px}
  .ic{width:64px;height:64px;margin:0 auto 22px;border-radius:50%;background:rgba(25,195,125,.14);border:1px solid rgba(25,195,125,.4);display:grid;place-items:center;color:var(--accent)}
  .ic svg{width:32px;height:32px}
  h1{font-family:var(--font-d);font-weight:700;font-size:1.7rem;letter-spacing:-.02em;margin-bottom:12px}
  p{color:var(--dim);margin-bottom:10px}
  .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px}
  .btn{font-weight:600;font-size:14.5px;border-radius:12px;padding:11px 18px;text-decoration:none;border:1px solid var(--line-2);color:var(--text)}
  .btn-primary{background:var(--accent);color:var(--accent-ink);border-color:transparent}
  a{color:var(--accent)}
</style>
</head>
<body>
  <main class="card">
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12l5 5L20 7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <h1>Email confirmed</h1>
    <p>Thanks! Your <strong>API key</strong> is on its way — check your inbox
       (and the spam folder, if needed).</p>
    <p>Next step: connect Agentic-Firmenbuch.at to your AI tool.</p>
    <div class="actions">
      <a class="btn btn-primary" href="onboarding.en.html">Set up the connection</a>
      <a class="btn" href="playground.en.html">Open the playground</a>
    </div>
  </main>
</body>
</html>
